name: Build and Release Android App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android App (AAB & APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle
        run: |
          sed -i -e 's/\r$//' gradlew
          chmod +x gradlew
        continue-on-error: true

      - name: Create fallback gradlew if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 9.3.1
            chmod +x gradlew
          fi

      - name: Create .env File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Build Unsigned Release AAB & APK
        run: ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload AAB Artifact (For Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release-unsigned.aab
